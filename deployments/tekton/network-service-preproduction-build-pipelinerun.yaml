apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  generateName: network-service-preproduction-build-
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: devflow
    app.kubernetes.io/component: ci
    service: network-service
    environment: pre-production
spec:
  pipelineRef:
    name: devflow-tekton-image-build-push-only
  params:
    - name: git-url
      value: "ssh://git@github.com/bsonger/devflow-service.git"
    - name: git-revision
      value: "main"
    - name: image-registry
      value: "registry.cn-hangzhou.aliyuncs.com/devflow"
    - name: name
      value: "network-service"
    - name: image-tag
      value: "preproduction"
    - name: DOCKERFILE
      value: "Dockerfile"
    - name: BUILD_ARGS
      value: "--build-arg SERVICE_NAME=network-service --build-arg SERVICE_PORT=8086"
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 5Gi
          storageClassName: local-path
    - name: dockerconfig
      secret:
        secretName: aliyun-docker-config
    - name: ssh
      secret:
        secretName: git-ssh-secret
  timeouts:
    pipeline: 1h0m0s

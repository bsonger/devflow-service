apiVersion: v1
kind: ConfigMap
metadata:
  name: runtime-service-config
  namespace: devflow-pre-production
  labels:
    app.kubernetes.io/name: runtime-service
    app.kubernetes.io/part-of: devflow
data:
  config.yaml: |
    server:
      port: 8084
    log:
      level: "info"
      format: "json"
    otel:
      endpoint: "http://otel-collector.observability.svc.cluster.local:4318"
      protocol: "http/protobuf"
      service_name: "runtime-service"
      resource_attributes: "deployment.environment=pre-production,service.version=preproduction-runtime-20260425"
      sample_ratio: 0.1
    downstream:
      release_service_base_url: "http://release-service.devflow-pre-production.svc.cluster.local:8083"
    observer:
      shared_token: ""
      tekton_namespace: "tekton-pipelines"
      poll_interval_seconds: 15
    pyroscope: ""
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: runtime-service
  namespace: devflow-pre-production
  labels:
    app.kubernetes.io/name: runtime-service
    app.kubernetes.io/part-of: devflow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: runtime-service-runtime-operator
  labels:
    app.kubernetes.io/name: runtime-service
    app.kubernetes.io/part-of: devflow
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: runtime-service-runtime-operator
  labels:
    app.kubernetes.io/name: runtime-service
    app.kubernetes.io/part-of: devflow
subjects:
  - kind: ServiceAccount
    name: runtime-service
    namespace: devflow-pre-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: runtime-service-runtime-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: runtime-service-tekton-observer
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/name: runtime-service
    app.kubernetes.io/part-of: devflow
rules:
  - apiGroups: ["tekton.dev"]
    resources: ["pipelineruns", "taskruns"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: runtime-service-tekton-observer
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/name: runtime-service
    app.kubernetes.io/part-of: devflow
subjects:
  - kind: ServiceAccount
    name: runtime-service
    namespace: devflow-pre-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: runtime-service-tekton-observer
---
apiVersion: v1
kind: Service
metadata:
  name: runtime-service
  namespace: devflow-pre-production
  labels:
    app.kubernetes.io/name: runtime-service
    app.kubernetes.io/part-of: devflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: runtime-service
  ports:
    - name: http
      port: 8084
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: runtime-service
  namespace: devflow-pre-production
  labels:
    app.kubernetes.io/name: runtime-service
    app.kubernetes.io/part-of: devflow
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: runtime-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: runtime-service
        app.kubernetes.io/part-of: devflow
    spec:
      serviceAccountName: runtime-service
      containers:
        - name: runtime-service
          image: registry.cn-hangzhou.aliyuncs.com/devflow/runtime-service:preproduction
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8084
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/config
              readOnly: true
      imagePullSecrets:
        - name: aliyun-docker-config
      volumes:
        - name: config
          configMap:
            name: runtime-service-config
      securityContext:
        runAsNonRoot: true
      terminationGracePeriodSeconds: 30

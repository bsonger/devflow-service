apiVersion: v1
kind: ConfigMap
metadata:
  name: network-service-config
  namespace: devflow-pre-production
  labels:
    app.kubernetes.io/name: network-service
    app.kubernetes.io/part-of: devflow
data:
  config.yaml: |
    server:
      port: 8086
    postgres:
      dsn: "postgresql://app:Sm3MQA5IVcPt1wUiOm1cpEU0w9vJBhPChjoUXcuCGY6cW4Yo9qUkqaNMf1OfrSIi@pg18-rw.database:5432/app"
      max_open_conns: 20
      max_idle_conns: 10
      conn_max_lifetime_minutes: 30
    log:
      level: "info"
      format: "json"
    otel:
      endpoint: "http://otel-collector.observability.svc.cluster.local:4318"
      protocol: "http/protobuf"
      service_name: "network-service"
      resource_attributes: "deployment.environment=pre-production,service.version=preproduction-network-20260425"
      sample_ratio: 0.1
    pyroscope: ""
---
apiVersion: v1
kind: Service
metadata:
  name: network-service
  namespace: devflow-pre-production
  labels:
    app.kubernetes.io/name: network-service
    app.kubernetes.io/part-of: devflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: network-service
  ports:
    - name: http
      port: 8086
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: network-service
  namespace: devflow-pre-production
  labels:
    app.kubernetes.io/name: network-service
    app.kubernetes.io/part-of: devflow
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: network-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: network-service
        app.kubernetes.io/part-of: devflow
    spec:
      containers:
        - name: network-service
          image: registry.cn-hangzhou.aliyuncs.com/devflow/network-service:preproduction
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8086
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/devflow/config
              readOnly: true
      imagePullSecrets:
        - name: aliyun-docker-config
      volumes:
        - name: config
          configMap:
            name: network-service-config
      securityContext:
        runAsNonRoot: true
      terminationGracePeriodSeconds: 30

apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: devflow-preproduction-gateway
  namespace: devflow-pre-production
  labels:
    app.kubernetes.io/part-of: devflow
    environment: pre-production
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 80
        name: http
        protocol: HTTP
      hosts:
        - devflow-pre-production.bei.com
---
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: devflow-shared-services-edge
  namespace: devflow-pre-production
  labels:
    app.kubernetes.io/part-of: devflow
    environment: pre-production
spec:
  hosts:
    - devflow-pre-production.bei.com
  gateways:
    - istio-system/devflow-gateway
  http:
    - name: meta-service-root
      match:
        - uri:
            exact: /api/v1/meta
      rewrite:
        uri: /api/v1
      route:
        - destination:
            host: meta-service.devflow-pre-production.svc.cluster.local
            port:
              number: 8081
    - name: meta-service-prefix
      match:
        - uri:
            prefix: /api/v1/meta/
      rewrite:
        uri: /api/v1/
      route:
        - destination:
            host: meta-service.devflow-pre-production.svc.cluster.local
            port:
              number: 8081
    - name: config-service-root
      match:
        - uri:
            exact: /api/v1/config
      rewrite:
        uri: /api/v1
      route:
        - destination:
            host: config-service.devflow-pre-production.svc.cluster.local
            port:
              number: 8082
    - name: config-service-prefix
      match:
        - uri:
            prefix: /api/v1/config/
      rewrite:
        uri: /api/v1/
      route:
        - destination:
            host: config-service.devflow-pre-production.svc.cluster.local
            port:
              number: 8082
    - name: network-service-root
      match:
        - uri:
            exact: /api/v1/network
      rewrite:
        uri: /api/v1
      route:
        - destination:
            host: network-service.devflow-pre-production.svc.cluster.local
            port:
              number: 8086
    - name: network-service-prefix
      match:
        - uri:
            prefix: /api/v1/network/
      rewrite:
        uri: /api/v1/
      route:
        - destination:
            host: network-service.devflow-pre-production.svc.cluster.local
            port:
              number: 8086
    - name: runtime-service-root
      match:
        - uri:
            exact: /api/v1/runtime
      route:
        - destination:
            host: runtime-service.devflow-pre-production.svc.cluster.local
            port:
              number: 8084
    - name: runtime-service-prefix
      match:
        - uri:
            prefix: /api/v1/runtime/
      route:
        - destination:
            host: runtime-service.devflow-pre-production.svc.cluster.local
            port:
              number: 8084
    - name: release-service-root
      match:
        - uri:
            exact: /api/v1/release
      rewrite:
        uri: /api/v1
      route:
        - destination:
            host: release-service.devflow-pre-production.svc.cluster.local
            port:
              number: 8083
    - name: release-service-prefix
      match:
        - uri:
            prefix: /api/v1/release/
      rewrite:
        uri: /api/v1/
      route:
        - destination:
            host: release-service.devflow-pre-production.svc.cluster.local
            port:
              number: 8083
    - name: legacy-platform-root
      match:
        - uri:
            exact: /api/v1/platform
      rewrite:
        uri: /api/v1
      route:
        - destination:
            host: meta-service.devflow-pre-production.svc.cluster.local
            port:
              number: 8081
    - name: legacy-platform-prefix
      match:
        - uri:
            prefix: /api/v1/platform/
      rewrite:
        uri: /api/v1/
      route:
        - destination:
            host: meta-service.devflow-pre-production.svc.cluster.local
            port:
              number: 8081
    - name: platform-web-root
      match:
        - uri:
            exact: /platform
      rewrite:
        uri: /
      route:
        - destination:
            host: devflow-platform-web.devflow-pre-production.svc.cluster.local
            port:
              number: 80
    - name: platform-web-prefix
      match:
        - uri:
            prefix: /platform/
      rewrite:
        uri: /
      route:
        - destination:
            host: devflow-platform-web.devflow-pre-production.svc.cluster.local
            port:
              number: 80

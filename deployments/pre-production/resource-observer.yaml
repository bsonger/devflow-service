apiVersion: v1
kind: ConfigMap
metadata:
  name: resource-observer-config
  namespace: devflow-pre-production
  labels:
    app.kubernetes.io/name: resource-observer
    app.kubernetes.io/part-of: devflow
data:
  config.yaml: |
    kubeconfig_path: ""
    verify:
      base_url: http://release-service.devflow-pre-production.svc.cluster.local:8083
      shared_token: ""
    release:
      base_url: http://release-service.devflow-pre-production.svc.cluster.local:8083
      shared_token: ""
    runtime:
      base_url: http://runtime-service.devflow-pre-production.svc.cluster.local:8084
      shared_token: ""
    metrics:
      addr: :9090
    log:
      level: info
    otel:
      endpoint: ""
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: resource-observer
  namespace: devflow-pre-production
  labels:
    app.kubernetes.io/name: resource-observer
    app.kubernetes.io/part-of: devflow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devflow-resource-observer-preproduction
  labels:
    app.kubernetes.io/name: resource-observer
    app.kubernetes.io/part-of: devflow
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: devflow-resource-observer
subjects:
  - kind: ServiceAccount
    name: resource-observer
    namespace: devflow-pre-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-observer
  namespace: devflow-pre-production
  labels:
    app.kubernetes.io/name: resource-observer
    app.kubernetes.io/part-of: devflow
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: resource-observer
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: resource-observer
        app.kubernetes.io/part-of: devflow
    spec:
      serviceAccountName: resource-observer
      imagePullSecrets:
        - name: aliyun-docker-config
      nodeSelector:
        kubernetes.io/hostname: node
      containers:
        - name: resource-observer
          image: registry.cn-hangzhou.aliyuncs.com/devflow/devflow-resource-observer:staging
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          volumeMounts:
            - name: config
              mountPath: /etc/devflow/config/config.yaml
              readOnly: true
              subPath: config.yaml
      volumes:
        - name: config
          configMap:
            name: resource-observer-config

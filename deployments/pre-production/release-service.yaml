apiVersion: v1
kind: ConfigMap
metadata:
  name: release-service-config
  namespace: pre-production
  labels:
    app.kubernetes.io/name: release-service
    app.kubernetes.io/part-of: devflow
data:
  config.yaml: |
    server:
      port: 8083
    postgres:
      dsn: "postgres://USERNAME:PASSWORD@POSTGRES_HOST:5432/devflow?sslmode=disable"
      max_open_conns: 20
      max_idle_conns: 10
      conn_max_lifetime_minutes: 30
    log:
      level: "info"
      format: "json"
    otel:
      endpoint: "http://otel-collector.observability.svc.cluster.local:4318"
      protocol: "http/protobuf"
      service_name: "release-service"
      resource_attributes: "deployment.environment=pre-production,service.version=preproduction-release-20260425"
      sample_ratio: 0.1
    repo:
      address: "https://github.com/bsonger/manifests.git"
      path: "manifests"
    runtime:
      base_url: "http://runtime-service.pre-production.svc.cluster.local:8084"
    observer:
      shared_token: ""
    downstream:
      platform_orchestrator_base_url: "http://meta-service.pre-production.svc.cluster.local:8081"
      app_service_base_url: "http://meta-service.pre-production.svc.cluster.local:8081"
      network_service_base_url: "http://network-service.pre-production.svc.cluster.local:8086"
      config_service_base_url: "http://config-service.pre-production.svc.cluster.local:8082"
    image_registry:
      registry: "registry.cn-hangzhou.aliyuncs.com"
      namespace: "devflow"
      username: ""
      password: ""
    manifest_registry:
      repository: "manifests"
      plain_http: false
    pyroscope: ""
---
apiVersion: v1
kind: Service
metadata:
  name: release-service
  namespace: pre-production
  labels:
    app.kubernetes.io/name: release-service
    app.kubernetes.io/part-of: devflow
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: release-service
  ports:
    - name: http
      port: 8083
      targetPort: http
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-service
  namespace: pre-production
  labels:
    app.kubernetes.io/name: release-service
    app.kubernetes.io/part-of: devflow
spec:
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: release-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
  template:
    metadata:
      labels:
        app.kubernetes.io/name: release-service
        app.kubernetes.io/part-of: devflow
    spec:
      containers:
        - name: release-service
          image: registry.cn-hangzhou.aliyuncs.com/devflow/release-service:preproduction
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8083
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              memory: "64Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: config
              mountPath: /etc/devflow/config
              readOnly: true
      imagePullSecrets:
        - name: aliyun-docker-config
      volumes:
        - name: config
          configMap:
            name: release-service-config
      securityContext:
        runAsNonRoot: true
      terminationGracePeriodSeconds: 30

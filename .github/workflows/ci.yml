name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify gofmt
        run: make fmt-check

      - name: Run go vet
        run: make vet

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          args: ./...

      - name: Run unit tests
        run: make test

      - name: Build target binary
        run: make build

      - name: Build linux target binary
        run: make package

      - name: Build root runtime image
        run: make docker-build DOCKER_IMAGE=devflow-service:ci

      - name: Run repo verifier
        run: make verify

  tekton-build:
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: pre-production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'v1.30.0'

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Trigger Tekton PipelineRun
        id: trigger
        run: |
          IMAGE_TAG="staging-${{ github.sha }}"
          PIPELINE_RUN_NAME=$(sed \
            -e "s|GIT_URL_PLACEHOLDER|https://github.com/${{ github.repository }}.git|g" \
            -e "s|GIT_REVISION_PLACEHOLDER|${{ github.sha }}|g" \
            -e "s|IMAGE_TAG_PLACEHOLDER|${IMAGE_TAG}|g" \
            deployments/tekton/pipeline-run-template.yaml | kubectl create -f - -o jsonpath='{.metadata.name}')
          echo "pipelinerun=${PIPELINE_RUN_NAME}" >> "$GITHUB_OUTPUT"
          echo "Triggered PipelineRun: ${PIPELINE_RUN_NAME}"

      - name: Wait for PipelineRun
        run: |
          PIPELINE_RUN="${{ steps.trigger.outputs.pipelinerun }}"
          echo "Waiting for PipelineRun: ${PIPELINE_RUN}"
          kubectl wait pipelinerun/${PIPELINE_RUN} \
            -n tekton-pipelines \
            --for=jsonpath='{.status.conditions[?(@.type=="Succeeded")].status}=True' \
            --timeout=30m
